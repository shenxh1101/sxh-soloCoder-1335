<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 程序化城市生成器</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <canvas id="city-canvas"></canvas>
    
    <div id="ui-panel">
      <div class="panel-header">
        <h2>🏙️ 城市生成器</h2>
        <button id="toggle-panel" class="btn-icon">—</button>
      </div>
      
      <div class="panel-content">
        <div class="section">
          <h3>📐 基础参数</h3>
          <div class="control">
            <label>地图大小: <span id="map-size-value">200</span></label>
            <input type="range" id="map-size" min="100" max="500" step="10" value="200">
          </div>
          <div class="control">
            <label>建筑密度: <span id="density-value">0.7</span></label>
            <input type="range" id="density" min="0.2" max="1" step="0.05" value="0.7">
          </div>
          <div class="control">
            <label>水域比例: <span id="water-ratio-value">0.1</span></label>
            <input type="range" id="water-ratio" min="0" max="0.4" step="0.02" value="0.1">
          </div>
        </div>
        
        <div class="section">
          <h3>🛣️ 道路网格</h3>
          <div class="control">
            <label>网格类型</label>
            <select id="road-type">
              <option value="grid">网格状</option>
              <option value="radial">放射状</option>
              <option value="organic">有机曲线</option>
            </select>
          </div>
        </div>
        
        <div class="section">
          <h3>🏢 建筑参数</h3>
          <div class="control">
            <label>最小高度: <span id="min-height-value">10</span></label>
            <input type="range" id="min-height" min="5" max="50" step="1" value="10">
          </div>
          <div class="control">
            <label>最大高度: <span id="max-height-value">80</span></label>
            <input type="range" id="max-height" min="20" max="200" step="5" value="80">
          </div>
        </div>
        
        <div class="section">
          <h3>🗺️ 分区编辑</h3>
          <div class="control">
            <label>预设分区模式</label>
            <select id="zone-preset">
              <option value="auto">自动分布</option>
              <option value="center-commercial">中心商业区</option>
              <option value="industrial-park">产业园区</option>
              <option value="residential-only">纯住宅区</option>
              <option value="mixed">混合社区</option>
            </select>
          </div>
          <div class="control">
            <label>商业中心X: <span id="zone-com-x-value">0</span>%</label>
            <input type="range" id="zone-com-x" min="-50" max="50" step="5" value="0">
          </div>
          <div class="control">
            <label>商业中心Z: <span id="zone-com-z-value">0</span>%</label>
            <input type="range" id="zone-com-z" min="-50" max="50" step="5" value="0">
          </div>
          <div class="control">
            <label>商业影响半径: <span id="zone-com-radius-value">30</span>%</label>
            <input type="range" id="zone-com-radius" min="5" max="60" step="5" value="30">
          </div>
          <div class="control">
            <label>工业区方向: <span id="zone-industrial-angle-value">180</span>°</label>
            <input type="range" id="zone-industrial-angle" min="0" max="360" step="15" value="180">
          </div>
          <div class="zone-colors">
            <span class="zone-tag zone-commercial">商业</span>
            <span class="zone-tag zone-residential">住宅</span>
            <span class="zone-tag zone-industrial">工业</span>
          </div>
        </div>
        
        <div class="section">
          <h3>☀️ 时间系统</h3>
          <div class="control">
            <label>时间: <span id="time-value">12:00</span></label>
            <input type="range" id="time-of-day" min="0" max="24" step="0.1" value="12">
          </div>
        </div>
        
        <div class="section">
          <h3>🌦️ 天气系统</h3>
          <div class="control">
            <label>天气</label>
            <select id="weather">
              <option value="sunny">☀️ 晴天</option>
              <option value="cloudy">☁️ 阴天</option>
              <option value="rainy">🌧️ 雨夜</option>
            </select>
          </div>
        </div>
        
        <div class="section">
          <h3>🎥 相机模式</h3>
          <div class="control">
            <label>模式</label>
            <select id="camera-mode">
              <option value="overview">俯瞰全景</option>
              <option value="street">街道漫游</option>
              <option value="flight">飞行模式</option>
            </select>
          </div>
        </div>
        
        <div class="section">
          <h3>💾 方案管理</h3>
          <div class="control">
            <label>保存方案</label>
            <input type="text" id="preset-name" placeholder="方案名称..." maxlength="20">
          </div>
          <div class="control">
            <label>已保存方案</label>
            <select id="preset-list">
              <option value="">-- 选择方案 --</option>
            </select>
          </div>
          <div class="button-group horizontal">
            <button id="save-preset" class="btn btn-secondary">💾 保存</button>
            <button id="load-preset" class="btn btn-secondary">📂 载入</button>
            <button id="delete-preset" class="btn btn-secondary">🗑️ 删除</button>
          </div>
        </div>
        
        <div class="section button-group">
          <button id="regenerate" class="btn btn-primary">🔄 重新生成</button>
          <button id="export-image" class="btn btn-secondary">📷 导出截图</button>
          <button id="export-json" class="btn btn-secondary">📄 导出 JSON</button>
        </div>
        
        <div class="section stats">
          <div>FPS: <span id="fps">0</span></div>
          <div>建筑数: <span id="building-count">0</span></div>
        </div>
      </div>
    </div>
    
    <div id="loading" class="loading-overlay hidden">
      <div class="loading-content">
        <div class="spinner"></div>
        <p>正在生成城市...</p>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
